<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미국주식 투자기간별 수익률 — S&P 500</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');

:root {
  --cream: #faf8f4;
  --warm-white: #ffffff;
  --ink: #1a1714;
  --ink-soft: #3d3833;
  --muted: #9c958d;
  --border: #e8e3da;
  --border-strong: #cdc6bc;
  --red: #c0392b;
  --red-light: #fdf2f0;
  --blue: #1a5fa8;
  --blue-mid: #2874c8;
  --blue-light: #eef4fc;
  --green: #1a7a4a;
  --gold: #b8860b;
  --gold-light: #fef9ec;
  --bar-neg: #e05a47;
  --bar-pos: #2874c8;
  --bar-high: #5b4fcf;
  --zero-line: #c8a027;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--cream);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  padding: 0;
}


/* ── HEADER ── */
.page-header {
  background: var(--ink);
  color: var(--cream);
  padding: 52px 48px 44px;
  position: relative;
  overflow: hidden;
}
.page-header::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 320px; height: 320px;
  border-radius: 50%;
  background: rgba(255,255,255,0.03);
  pointer-events: none;
}
.page-header::after {
  content: '';
  position: absolute;
  bottom: -40px; left: 30%;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: rgba(255,255,255,0.02);
  pointer-events: none;
}
.header-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}
.header-title {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(28px, 4vw, 48px);
  line-height: 1.15;
  color: #fff;
  max-width: 640px;
}
.header-title em {
  font-style: italic;
  color: #c9b98a;
}
.header-sub {
  margin-top: 16px;
  font-size: 13px;
  color: #7a736b;
  letter-spacing: 0.3px;
}


/* ── HEADER RESPONSIVE ── */
.header-inner {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  flex-wrap: wrap;
  gap: 16px;
}
.header-credit {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 10px;
  padding-top: 4px;
}
@media (max-width: 600px) {
  .page-header { padding: 36px 24px 32px; }
  .header-inner {
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .header-title { font-size: 28px; }
  .header-credit {
    align-items: center;
    width: 100%;
  }
}


/* ── MOBILE CHART FIXES ── */
@media (max-width: 600px) {
  .chart-card { padding: 20px 12px 16px; }
  .page-body { padding: 24px 16px 48px; }
  .bars-grid { height: 180px; overflow-x: auto; }
  .bar-col { height: 180px; }
  .zero-marker { height: 180px; }
  .bar-val { font-size: 8.5px; }
  .axis-lbl { font-size: 8px; }
  /* On mobile show only every 10% label */
  .axis-lbl.hide-mobile { display: none; }
  .stat-cell { padding: 14px 16px; }
  .stat-cell-value { font-size: 22px; }
  .chart-legend { gap: 10px; justify-content: flex-start; }
  .leg-item { font-size: 10px; }
}

/* ── MAIN LAYOUT ── */
.page-body {
  max-width: 1080px;
  margin: 0 auto;
  padding: 40px 32px 64px;
}

/* ── YEAR SELECTOR ── */
.selector-section {
  margin-bottom: 32px;
}
.selector-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}
.year-grid {
  display: grid;
  grid-template-columns: repeat(20, 1fr);
  gap: 6px;
}
@media (max-width: 700px) {
  .year-grid { grid-template-columns: repeat(10, 1fr); }
}
.year-btn {
  aspect-ratio: 1;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--warm-white);
  color: var(--ink-soft);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  overflow: hidden;
}
.year-btn:hover {
  border-color: var(--blue-mid);
  color: var(--blue);
  background: var(--blue-light);
}
.year-btn.active {
  font-weight: 700;
  box-shadow: 0 3px 12px rgba(0,0,0,0.2);
  transform: translateY(-2px);
  /* 색상은 JS에서 손실 확률에 따라 동적으로 적용 */
}


/* ── STATS ROW ── */
.stats-band {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 32px;
}
@media (max-width: 600px) {
  .stats-band { grid-template-columns: repeat(2, 1fr); }
}
.stat-cell {
  background: var(--warm-white);
  padding: 20px 24px;
}
.stat-cell-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.stat-cell-value {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  line-height: 1;
}
.val-green { color: var(--green); }
.val-red   { color: var(--red); }
.val-blue  { color: var(--blue); }
.val-gold  { color: var(--gold); }

/* ── CHART ── */
.chart-card {
  background: var(--warm-white);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px 16px 24px;
  margin-bottom: 24px;
  box-shadow: 0 1px 12px rgba(0,0,0,0.04);
}
.chart-eyebrow {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.chart-heading {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(18px, 2.5vw, 26px);
  color: var(--ink);
  margin-bottom: 28px;
}
.chart-heading span { color: var(--blue); font-style: normal; font-weight: 700; }

.chart-wrap { position: relative; }
.chart-wrap {
  position: relative;
  width: 100%;
}
.bars-grid {
  display: grid;
  align-items: end;
  width: 100%;
  /* 막대 영역 240px + bar-lbl 22px = 262px 고정 */
  height: 262px;
  position: relative;
  z-index: 1;
}
.bar-col {
  /* 부모 높이에 꽉 차게 */
  height: 262px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  min-width: 0;
  overflow: visible;
}
.bar-val {
  font-size: 10px;
  font-weight: 600;
  color: var(--ink-soft);
  height: 15px;
  width: 100%;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 2px;
  white-space: nowrap;
}
.bar-rect {
  width: 80%;
  border-radius: 3px 3px 0 0;
  transition: height 0.55s cubic-bezier(0.34, 1.4, 0.64, 1);
  flex-shrink: 0;
}
/* 축선(border-top) + x축 텍스트 */
.bar-lbl {
  width: 100%;
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-soft);
  text-align: center;
  padding-top: 5px;
  height: 22px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  white-space: nowrap;
  border-top: 2px solid var(--border-strong);
}



/* legend */
.chart-legend {
  display: flex;
  gap: 18px;
  margin-top: 18px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.leg-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--muted);
}
.leg-dot {
  width: 10px; height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* ── INSIGHT ── */
.insight-strip {
  background: var(--blue-light);
  border-left: 3px solid var(--blue);
  border-radius: 0 10px 10px 0;
  padding: 14px 20px;
  font-size: 13.5px;
  line-height: 1.75;
  color: var(--ink-soft);
}
.insight-strip strong { color: var(--blue); font-weight: 600; }

/* ── SUMMARY TABLE ── */
.summary-section { margin-top: 48px; }
.section-title {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  color: var(--ink);
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--border);
}
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
}
.sum-card {
  background: var(--warm-white);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
  cursor: pointer;
  transition: all 0.18s;
}
.sum-card:hover { border-color: var(--blue-mid); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
.sum-card.active { border-color: var(--ink); background: var(--ink); color: #fff; }
.sum-card.active .sc-label,
.sum-card.active .sc-sub { color: rgba(255,255,255,0.55); }
.sum-card.active .sc-neg-good { color: #5de0a0; }
.sum-card.active .sc-neg-warn { color: #fbbf5a; }
.sum-card.active .sc-neg-bad  { color: #f87171; }
.sc-label { font-size: 10px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.sc-period { font-family: 'DM Serif Display', serif; font-size: 22px; color: inherit; }
.sc-sub { font-size: 11px; color: var(--muted); margin-top: 8px; display: flex; flex-direction: column; gap: 3px; }
.sc-row { display: flex; justify-content: space-between; }
.sc-neg-good { color: var(--green); font-weight: 600; }
.sc-neg-warn { color: var(--gold); font-weight: 600; }
.sc-neg-bad  { color: var(--red);  font-weight: 600; }
.sc-mean     { color: var(--blue); font-weight: 600; }

/* footer */
.page-footer {
  text-align: center;
  padding: 32px 16px;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.3px;
  border-top: 1px solid var(--border);
  max-width: 1080px;
  margin: 0 auto;
}
</style>
</head>

function negColor(neg) {
  if (neg === 0)    return '#1a7a4a';
  if (neg <= 5)     return '#2d8f5e';
  if (neg <= 10)    return '#b8860b';
  return '#c0392b';
}

function barColor(bin, pct) {
  if (pct === 0) return 'transparent';
  var a = 0.35 + (pct / 50) * 0.65;
  if (a > 1) a = 1;
  if (bin < 0)   return 'rgba(224,90,71,'  + a + ')';
  if (bin >= 20) return 'rgba(91,79,207,'  + a + ')';
  return             'rgba(40,116,200,'    + a + ')';
}

// Build year buttons
var grid = document.getElementById('yearGrid');
for (var y = 1; y <= 20; y++) {
  (function(yr) {
    var d = allData[yr];
    var btn = document.createElement('button');
    btn.className = 'year-btn';
    btn.id = 'ybtn-' + yr;
    btn.textContent = yr;
    btn.title = yr + '년 투자';

    btn.addEventListener('click', function() { render(yr); });
    if (d.neg === 0) {
      btn.style.background = '#e8f5ee';
      btn.style.borderColor = '#6dbb90';
      btn.style.color = '#1a7a4a';
      btn.dataset.activeBg = '#1a7a4a';
      btn.dataset.activeBorder = '#1a7a4a';
    } else if (d.neg <= 10) {
      btn.style.background = '#fef9ec';
      btn.style.borderColor = '#e0b84a';
      btn.style.color = '#92690a';
      btn.dataset.activeBg = '#b8860b';
      btn.dataset.activeBorder = '#b8860b';
    } else {
      btn.style.background = '#fdf2f0';
      btn.style.borderColor = '#e8937f';
      btn.style.color = '#a63020';
      btn.dataset.activeBg = '#c0392b';
      btn.dataset.activeBorder = '#c0392b';
    }
    grid.appendChild(btn);
  })(y);
}

// Build summary cards
var cg = document.getElementById('cardsGrid');
for (var y = 1; y <= 20; y++) {
  (function(yr) {
    var d = allData[yr];
    var nc = d.neg === 0 ? 'sc-neg-good' : d.neg <= 10 ? 'sc-neg-warn' : 'sc-neg-bad';
    var card = document.createElement('div');
    card.className = 'sum-card';
    card.id = 'card-' + yr;
    card.innerHTML =
      '<div class="sc-label">투자기간</div>' +
      '<div class="sc-period">' + yr + '년</div>' +
      '<div class="sc-sub">' +
        '<div class="sc-row"><span>평균 연수익</span><span class="sc-mean">+' + d.mean + '%</span></div>' +
        '<div class="sc-row"><span>손실 확률</span><span class="' + nc + '">' + d.neg + '%</span></div>' +
        '<div class="sc-row"><span>최저</span><span>' + (d.min > 0 ? '+' : '') + d.min + '%</span></div>' +
      '</div>';
    card.addEventListener('click', function() { render(yr); document.getElementById('selectorSection').scrollIntoView({behavior:'smooth', block:'start'}); });
    cg.appendChild(card);
  })(y);
}

function render(yr) {
  var d = allData[yr];

  // year buttons
  for (var i = 1; i <= 20; i++) {
    var b = document.getElementById('ybtn-' + i);
    b.classList.toggle('active', i === yr);
    if (i === yr) {
      b.style.background = b.dataset.activeBg;
      b.style.borderColor = b.dataset.activeBorder;
      b.style.color = '#fff';
    } else {
      // restore original color (re-apply from data)
      var neg = allData[i].neg;
      if (neg === 0) {
        b.style.background = '#e8f5ee'; b.style.borderColor = '#6dbb90'; b.style.color = '#1a7a4a';
      } else if (neg <= 10) {
        b.style.background = '#fef9ec'; b.style.borderColor = '#e0b84a'; b.style.color = '#92690a';
      } else {
        b.style.background = '#fdf2f0'; b.style.borderColor = '#e8937f'; b.style.color = '#a63020';
      }
    }
  }
  // summary cards
  for (var i = 1; i <= 20; i++) {
    document.getElementById('card-' + i).classList.toggle('active', i === yr);
  }

  // heading
  document.getElementById('chartHeading').innerHTML =
    '<span>' + yr + '년</span> 투자 연 수익률 분포';

  // stats band
  var nc = d.neg === 0 ? 'val-green' : d.neg < 10 ? 'val-gold' : 'val-red';
  var negLabel = d.neg + '%';
  document.getElementById('statsBand').innerHTML =
    '<div class="stat-cell"><div class="stat-cell-label">평균 연수익률</div><div class="stat-cell-value val-blue">' + (d.mean > 0 ? '+' : '') + d.mean + '%</div></div>' +
    '<div class="stat-cell" style="' + (d.neg === 0 ? 'background:#f0faf5;' : '') + '"><div class="stat-cell-label">손실 확률</div><div class="stat-cell-value ' + nc + '">' + negLabel + '</div></div>' +
    '<div class="stat-cell"><div class="stat-cell-label">최솟값</div><div class="stat-cell-value ' + (d.min < 0 ? 'val-red' : 'val-green') + '">' + (d.min > 0 ? '+' : '') + d.min + '%</div></div>' +
    '<div class="stat-cell"><div class="stat-cell-label">최댓값</div><div class="stat-cell-value val-blue">+' + d.max + '%</div></div>';

  // bars
  var gridCols = 'repeat(' + N + ',1fr)';
  var bg = document.getElementById('barsGrid');
  bg.style.gridTemplateColumns = gridCols;
  bg.innerHTML = '';
  var mx = Math.max.apply(null, d.hist);

  d.hist.forEach(function(pct, i) {
    var bin = bins[i];
    var col = document.createElement('div');
    col.className = 'bar-col';

    var valEl = document.createElement('div');
    valEl.className = 'bar-val';
    valEl.textContent = pct >= 1 ? pct + '%' : '';

    var rect = document.createElement('div');
    rect.className = 'bar-rect';
    rect.style.background = barColor(bin, pct);
    rect.style.height = '0px';

    var lbl = document.createElement('div');
    lbl.className = 'bar-lbl';
    lbl.textContent = bin % 10 === 0 ? bin + '%' : '';

    col.appendChild(valEl);
    col.appendChild(rect);
    col.appendChild(lbl);
    bg.appendChild(col);

    (function(r, p, idx) {
      if (p > 0) {
        var h = Math.max(3, (p / mx) * 215);
        setTimeout(function() { r.style.height = h + 'px'; }, 30 + idx * 16);
      }
    })(rect, pct, i);
  });

  // insight
  document.getElementById('insightStrip').innerHTML = insights[yr];
  var card = document.getElementById('chartSection');
  if (d.neg === 0) {
    card.style.borderColor = '#6dbb90';
    card.style.boxShadow = '0 0 0 3px rgba(109,187,144,0.2)';
  } else if (d.neg <= 10) {
    card.style.borderColor = '#e0b84a';
    card.style.boxShadow = '0 0 0 3px rgba(224,184,74,0.2)';
  } else {
    card.style.borderColor = '#e8937f';
    card.style.boxShadow = '0 0 0 3px rgba(232,147,127,0.2)';
  }



  // scroll to top of chart smoothly if needed
}

render(1);
</script>
